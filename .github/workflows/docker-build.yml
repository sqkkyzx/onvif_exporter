name: 构建并推送镜像

on:
  push:
    branches: [ "master" ]

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: ${{ github.repository }}
  RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: 📥 拉取代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ 提取 pyproject.toml 版本号
        id: get_version
        run: |
          python - <<'PY' > version.env
          import re
          import tomllib

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          version = data["project"]["version"]
          is_prerelease = "true" if re.search(
              r"(a|b|rc|dev)\d*(\+.*)?$",
              version,
              re.IGNORECASE,
          ) else "false"

          print(f"VERSION={version}")
          print(f"IS_PRERELEASE={is_prerelease}")
          PY

          cat version.env >> "$GITHUB_ENV"
          . ./version.env
          {
            echo "version=$VERSION"
            echo "is_prerelease=$IS_PRERELEASE"
          } >> "$GITHUB_OUTPUT"
          echo "提取到版本号: $VERSION"
          echo "是否预发布: $IS_PRERELEASE"

      - name: 🔑 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔑 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 📝 准备 Docker 镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            # 只有正式版 master 分支推送时才打 latest；1.0.0b0 这类预发布不会覆盖 latest。
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' && steps.get_version.outputs.is_prerelease != 'true' }}
            type=raw,value=${{ env.VERSION }}

      - name: 📦 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🧱 构建 Linux x86_64 二进制
        run: |
          docker run --rm \
            -e VERSION="${VERSION}" \
            -v "${PWD}:/src" \
            -w /src \
            python:3.14-slim-bookworm \
            bash scripts/build-linux-binary.sh

      - name: 📎 上传 Linux 二进制构建产物
        uses: actions/upload-artifact@v4
        with:
          name: onvif-exporter-linux-x86_64-v${{ env.VERSION }}
          path: release/onvif-exporter-linux-x86_64-v${{ env.VERSION }}.tar.gz
          if-no-files-found: error

      - name: 🔖 自动创建并推送 Git Tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if ! git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            git tag "v${{ env.VERSION }}"
            git push origin "v${{ env.VERSION }}"
            echo "已自动创建并推送 Tag: v${{ env.VERSION }}"
          else
            echo "Tag v${{ env.VERSION }} 已存在，跳过。"
          fi

      - name: 🚀 发布 Linux 二进制到 GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET="release/onvif-exporter-linux-x86_64-v${VERSION}.tar.gz"
          TAG="v${VERSION}"
          PRERELEASE_ARGS=""
          if [ "${IS_PRERELEASE}" = "true" ]; then
            PRERELEASE_ARGS="--prerelease"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
            if [ "${IS_PRERELEASE}" = "true" ]; then
              gh release edit "$TAG" --prerelease
            fi
          else
            gh release create "$TAG" "$ASSET" $PRERELEASE_ARGS \
              --title "$TAG" \
              --notes "Docker images are published to GHCR and Docker Hub. Linux x86_64 binary is attached for Debian LXC deployment."
          fi

      - name: 📢 发送钉钉构建通知
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MIRROR_HOST: ${{ secrets.MIRROR_REGISTRY_HOST }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ job.status }}" == "success" ]; then
            MSG="#### ${{ github.repository }} \n\n > 构建状态：[成功 ✅](${{ env.RUN_URL }}) \n\n > 版本: v${{ env.VERSION }} \n\n > GHCR: ${{ env.GHCR_IMAGE }} \n\n > DockerHub: ${{ env.DOCKERHUB_IMAGE }}\n\n > 镜像地址: ${{ env.MIRROR_HOST }}/${{ env.DOCKERHUB_IMAGE }}"
            TITLE="✅ 构建成功！"
          else
            MSG="#### ${{ github.repository }} \n\n > 构建状态：[失败 ❌](${{ env.RUN_URL }}) \n\n > 版本: v${{ env.VERSION }} "
            TITLE="❌ 构建失败！"
          fi

          if [ -n "$WEBHOOK_URL" ]; then
             curl -X POST "$WEBHOOK_URL" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"msgtype\": \"markdown\",
                    \"markdown\": {
                      \"title\": \"$TITLE\",
                      \"text\": \"$MSG\"
                    }
                  }"
          fi
